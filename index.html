<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>White Overlay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #fff;
      cursor: pointer;
    }

    .container {
      position: relative;
    }

    img, video {
      display: block;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #caption {
      margin-top: 12px;
      font-size: 13px;
      font-family: Arial, sans-serif;
      text-align: center;
      color: #333;
      max-width: min(650px, 95vw);
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="media-img" alt="" style="display:none;">
    <video id="media-video" loop muted playsinline style="display:none;"></video>
    <canvas id="overlay"></canvas>
  </div>
  <p id="caption">This is a placeholder caption. It will describe the artwork, its context, the medium used, and any other relevant details that the viewer might need to fully understand and appreciate what they see.</p>

  <script>
    const mediaFiles = [
      'IMG_2729.jpg',
      'IMG_3548.jpg',
      'VID-20220723-WA0001.mp4',
      'Severin_Bunse_Yale_in_the_world_bubble.gif',
      'Yale_in_the_World_03_350px.gif',
      'Severin_Bunse_Screensaver_2560_700K.gif',
      'Severin_Bunse_Screensaver_1920.jpg',
      'SeverinBunse_Bestarium_1900px_800K.gif',
      'SeverinBunse_Yale_in_the_World_2560_400K.gif',
      'Severin_BunseEcho&Delay_2560px_700K.gif',
      'Severin_Bunse_Halves_Signage_2560_700K.gif',
      'Severin_Bunse_Halves_Window_2560_700K.gif',
      'Severin_Bunse_Mary_Reid_Kelley_2560_700K.gif',
      'Severin_Bunse_Mary_Reid_Kelley_Vertical_2560.jpg',
      'Severin_Bunse_Mary_Reid_Kelly_2560_800K.gif',
      'Severin_Bunse_Material_Utopias_2560_700K.gif',
      'Severin_Bunse_PGWeise_2560_2,8M.png',
      'Severin_Bunse_PGWeise_2560_400K.gif',
      'Severin_Bunse_Schuit_2560_900K.gif',
      'Severin_Bunse_StandArt_2560_400K.jpg',
      'Severin_Bunse_StandArt_A_Vertical_2560.gif',
      'Severin_Bunse_StandArt_A_Vertical_2560.jpg',
      'Severin_Bunse_StandArt_N_2560.jpg',
      'Severin_Bunse_Tennhauser_Gate_2560_600K.gif',
      'Severin_Bunse_Thesis_2560_700K.gif',
      'Severin_Bunse_screeensaver_2560_2,8m.jpg',
    ];

    const DEFAULT_CAPTION = 'This is a placeholder caption. It will describe the artwork, its context, the medium used, and any other relevant details that the viewer might need to fully understand and appreciate what they see.';

    // Parallel to mediaFiles, by index. Slides without an entry yet just
    // keep showing DEFAULT_CAPTION.
    const captions = [
      undefined, // slide 1 (IMG_2729.jpg) — no caption provided yet
      `Identity for the midterm exhibition of the undergraduate program at Yale School of Art. The identity consisting of a title, signage, posters, teasers and a window display made of 24 engraved glasses from the local thrift store. The title of the Show "Halves" is a reference to the common expression, "Is the glass half empty or half full?" and the signage referenced spilled water. This project was developed in collaboration with Cindy Hwang and Matthias Neckermann. New Haven, 2019.`,
      `The Fashion Show — Visual campaign for the graduation show of the fashion design department at the Gerrit Rietveld Academie, consisting of a title, teasers, invitations, a newspaper, signage as well as a concept for the spacial design of the show. The campaign contrasted found images from fashion magazines with everyday banalities in an attempt to represent the friction between high fashion and every day life. Project developed in collaboration with Niklaus Mettler and Line-Gry Hørup. Amsterdam, 2014.`,
      `Material Utopias — Publication for the graduation show of the temporary masters program "Material Utopias" at the Sandberg Instituut in Amsterdam. Amsterdam, 2015.`,
      `Bestarium — Cover art for "A Sketch of the Past", an autobiographical essay written by Virginia Woolf in 1939 made in collaboration with Line Gry Hørup. Amsterdam, 2016.`,
      `YSoA in the World Digest — Three animation made for the biweekly email digest "Yale School of Art in the World." The image of a globe was used to illustrate the title of the newsletter while attempting to abstract the map by adding scans of books from the university library. New Haven, 2018.`,
      `YSoA in the World Digest 2 — Three animations made for the biweekly email digest "Yale School of Art in the World". For this second iteration of the project, the globes were turned into bubbles. New Haven, 2018.`,
      `Wedding Invitation — Wedding invite for Alix Masters and Emmil Weinstein. This project was developed in collaboration with Emma Gregoline. New York City, 2024.`,
      `Tennhaeuser Gate — Exhibition initiated and designed in collaboration with Rustan Soderling. The exhibition took place in the abandoned staircase of a former school building in Amsterdam and consisted of video work on screen and a fragrance developed by Niklaus Mettler. The invitation was a 3D rendered video work by the artists, based on a 3D scan of the space in which the exhibition took place. Amsterdam, 2017.`,
      `Thesis Book — Audiobook scripted, recorded and designed as part of the requirements to graduate from the graphic design program at the Yale School of Art. The tape contained several Slow Scan Television encodings of images I made during my time at the department. SSTV is a technology used to translate images into sound patterns for transmission through radio waves. New Haven, 2019.`,
      `Mary Reid Kelly — Poster for an artist talk with Mary Reid Kelley at Yale School of Art. I based this poster off of her video work, "Priapus Agonistes." Pasiphae, the main character in this piece, is a character from Greek mythology that, through a series of unfortunate circumstances, falls in love with a bull which results in the birth of the Minotaur. Formally the poster is a reference to some of the drawings showing up in the background of the video as posters and graffiti. New Haven, 2018.`,
      `Today a Reader — Campaign and exhibition design developed for the graduation show of the graphic design program at the Yale School of Art in collaboration with Emma Gregoline, Simone Cutri, Hyung Cho and Rosa McElheny. New Haven, 2019.`,
      `Screensaver — Screensaver made from an animated, three dimensional drawing in virtual reality. The drawing relates to the proportions of the human body as it is the documentation of my own gestures in three-dimensional space. The screensaver was published by eeebooks with the help of Marius Schwarz, François Girard-Meunier and Jonathan Puckey and can be downloaded for free at eeebooks.net. New Haven, 2019.`,
    ];

    const container   = document.querySelector('.container');
    const mediaImg    = document.getElementById('media-img');
    const mediaVideo  = document.getElementById('media-video');
    const canvas      = document.getElementById('overlay');
    const ctx         = canvas.getContext('2d');
    const captionEl   = document.getElementById('caption');

    const REVEAL_DURATION = 2;
    const EASE_START      = 0.8; // fraction of the duration after which the reveal eases to a stop
    const MAX_WIDTH       = 650;
    const MAX_HEIGHT      = 450;
    const BLEED           = 2; // px the overlay extends past the media's edges, to mask sub-pixel rounding gaps

    let currentIndex = 0;
    let revealId     = 0;
    let loadGen      = 0;

    // Reusable scratch memory for the reveal pixel buffers, sized for the
    // largest canvas this device can produce (the bounding box above, scaled
    // by its pixel ratio). Reusing these avoids allocating a fresh multi-
    // megabyte buffer on every slide transition.
    const SCRATCH_DPR    = window.devicePixelRatio || 1;
    const SCRATCH_PIXELS = Math.ceil((MAX_WIDTH + BLEED * 2) * SCRATCH_DPR) *
                            Math.ceil((MAX_HEIGHT + BLEED * 2) * SCRATCH_DPR);
    const orderScratch = new ArrayBuffer(SCRATCH_PIXELS * 4);
    const pixelScratch = new ArrayBuffer(SCRATCH_PIXELS * 4);

    function resizeMedia(el) {
      el.style.width     = 'auto';
      el.style.height    = 'auto';
      el.style.maxWidth  = `min(${MAX_WIDTH}px, 95vw)`;
      el.style.maxHeight = `min(${MAX_HEIGHT}px, 95vh)`;
    }

    // Keep .container pinned to the size of whatever's currently visible
    // while the next slide loads off-screen (hidden). Without this, the
    // container shrink-wraps to the hidden element's fluctuating size as it
    // loads, which reflows the centered page layout and visibly nudges the
    // caption before the new slide is even shown.
    function pinContainer(el) {
      container.style.width  = el.offsetWidth  + 'px';
      container.style.height = el.offsetHeight + 'px';
    }

    // Linear up to EASE_START, then tapers smoothly to a stop. The tail
    // curve's rate matches the incoming linear speed exactly at the
    // breakpoint (no jump) and eases continuously down to a standstill —
    // so deceleration begins seamlessly rather than with a kink.
    function easedProgress(t) {
      if (t >= 1) return 1;
      if (t <= EASE_START) return t;
      const s = (t - EASE_START) / (1 - EASE_START);
      return EASE_START + (1 - EASE_START) * (s + s * s - s * s * s);
    }

    function setupCanvas() {
      const el  = mediaVideo.style.display !== 'none' ? mediaVideo : mediaImg;
      const dpr = window.devicePixelRatio || 1;
      const w   = el.offsetWidth  + BLEED * 2;
      const h   = el.offsetHeight + BLEED * 2;
      canvas.width  = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      canvas.style.width  = w + 'px';
      canvas.style.height = h + 'px';
      canvas.style.left   = -BLEED + 'px';
      canvas.style.top    = -BLEED + 'px';
    }

    function startReveal(onComplete) {
      const myId = revealId;

      // Snap canvas back to fully opaque before building new reveal
      canvas.style.transition = 'none';
      canvas.style.opacity    = '1';

      setupCanvas();

      const width  = canvas.width;
      const height = canvas.height;
      const count  = width * height;

      // Maintain the reveal as a single off-DOM pixel buffer and push it to
      // the canvas with one putImageData() per frame, instead of thousands
      // of individual clearRect() calls — same visual result, far less
      // per-call browser overhead. Drawn from the shared scratch buffers
      // when they're big enough, falling back to a fresh allocation in the
      // rare case the device's pixel ratio grew since startup.
      const imageData = count <= SCRATCH_PIXELS
        ? new ImageData(new Uint8ClampedArray(pixelScratch, 0, count * 4), width, height)
        : ctx.createImageData(width, height);
      imageData.data.fill(255); // opaque white everywhere
      ctx.putImageData(imageData, 0, 0);

      const order = count <= SCRATCH_PIXELS
        ? new Uint32Array(orderScratch, 0, count)
        : new Uint32Array(count);
      for (let i = 0; i < count; i++) order[i] = i;
      for (let i = count - 1; i > 0; i--) {
        const j = (Math.random() * (i + 1)) | 0;
        const t = order[i]; order[i] = order[j]; order[j] = t;
      }

      const totalFrames = REVEAL_DURATION * 60;
      const data = imageData.data;
      let index = 0;
      let frame = 0;

      function animate() {
        if (myId !== revealId) return;
        frame++;
        const end = Math.min(count, Math.round(easedProgress(frame / totalFrames) * count));
        for (; index < end; index++) {
          data[order[index] * 4 + 3] = 0;
        }
        ctx.putImageData(imageData, 0, 0);
        if (index >= count) {
          canvas.style.transition = 'opacity 0.6s ease';
          canvas.style.opacity    = '0';
          canvas.addEventListener('transitionend', () => {
            if (myId !== revealId) return;
            canvas.style.transition = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.style.opacity = '1';
            if (onComplete) onComplete();
          }, { once: true });
          return;
        }
        requestAnimationFrame(animate);
      }
      animate();
    }

    // Skip a slide whose file failed to load (e.g. missing/mistyped filename)
    // instead of leaving the show stuck forever on it.
    function loadFailed(myGen, file) {
      if (myGen !== loadGen) return;
      console.warn('Failed to load media file:', file);
      advance();
    }

    function loadMedia(index) {
      const myGen   = ++loadGen;
      const file    = mediaFiles[index];
      const isVideo = file.split('.').pop().toLowerCase() === 'mp4';
      const el      = isVideo ? mediaVideo : mediaImg;
      const controller = new AbortController();

      (isVideo ? mediaImg : mediaVideo).style.display = 'none';
      if (!isVideo) mediaVideo.pause();
      el.style.visibility = 'hidden';
      el.style.display    = 'block';
      el.src = 'images/' + file;
      if (isVideo) el.load();

      const reveal = () => {
        resizeMedia(el);
        pinContainer(el);
        captionEl.textContent = captions[index] || DEFAULT_CAPTION;
        el.style.visibility = 'visible';
        if (isVideo) el.play().catch(() => {});
        startReveal();
      };
      const onReady = () => {
        controller.abort();
        if (myGen !== loadGen) return;
        // Only <img> has decode(); it lets us wait for the bitmap to be
        // ready off the main thread before revealing, avoiding a jank-y
        // synchronous decode on first paint. <video> has nothing to wait
        // for beyond 'canplay', so it reveals immediately.
        el.decode ? el.decode().then(reveal).catch(reveal) : reveal();
      };

      el.addEventListener('error', () => {
        controller.abort();
        loadFailed(myGen, file);
      }, { signal: controller.signal });

      if (!isVideo && el.complete) {
        onReady();
      } else {
        el.addEventListener(isVideo ? 'canplay' : 'load', onReady, { signal: controller.signal });
      }
    }

    function advance() {
      currentIndex = (currentIndex + 1) % mediaFiles.length;
      loadMedia(currentIndex);
    }

    // Pause/resume video when tab visibility changes
    document.addEventListener('visibilitychange', () => {
      if (mediaVideo.style.display === 'none') return;
      document.hidden ? mediaVideo.pause() : mediaVideo.play().catch(() => {});
    });

    // Initial load
    loadMedia(0);

    // Click advances to next
    document.addEventListener('click', () => {
      revealId++;
      canvas.style.transition = 'none';
      canvas.style.opacity    = '1';
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      advance();
    });
  </script>
</body>
</html>
